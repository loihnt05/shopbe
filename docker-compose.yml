services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
  postgres:
    image: postgres:16
    container_name: shopbend-postgres
    # restart: always
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shopbend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  seeder:
    image: mcr.microsoft.com/dotnet/sdk:8.0.403
    container_name: shopbend-seeder
    working_dir: /src
    entrypoint: []
    depends_on:
      - postgres
    volumes:
      - ./shopbend:/src:rw
    environment:
      # Optional: Shopbe.Seeder reads SHOPBE_ConnectionString too.
      SHOPBE_ConnectionString: Host=postgres;Port=5432;Database=shopbend;Username=shop;Password=shop
    command:
      - dotnet
      - run
      - --project
      - Shopbe.Seeder/Shopbe.Seeder.csproj
      - --
      - --migrate
      - "true"
      - --mode
      - ensure
      - --categories
      - "50"
      - --brands
      - "200"
      - --products
      - "20000"
      - --variants-min
      - "1"
      - --variants-max
      - "5"
      - --users
      - "5000"
      - --orders
      - "20000"
      - --max-items
      - "5"
      - --batch
      - "2000"
  
volumes:
  postgres_data:
    name: shopbend_postgres_data
  keycloak_data:
    name: shopbend_keycloak_data