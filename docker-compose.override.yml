services:
  shopbe-web:
    # Development override: run with hot reload
    image: mcr.microsoft.com/dotnet/sdk:8.0
    entrypoint: []
    working_dir: /src/shopbend/Shopbe.Web
    command: >-
      dotnet watch
      --project ./Shopbe.Web.csproj
      --non-interactive
      run --urls http://0.0.0.0:8080
    ports:
      - "5072:8080"
    volumes:
      # Mount source for instant rebuild/hot reload
      - ./shopbend:/src/shopbend
      # Cache NuGet packages between runs
      - nuget_packages:/root/.nuget/packages
      # Cache build outputs between runs (avoid full rebuild on each container start)
      - shopbe_web_bin:/src/shopbend/Shopbe.Web/bin
      - shopbe_web_obj:/src/shopbend/Shopbe.Web/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
      # match existing env so Keycloak/Postgres still work in docker network
      Authentication__Keycloak__Authority: http://keycloak:8080/realms/ShopBee
      Authentication__Keycloak__AuthorityExternal: http://localhost:8080/realms/ShopBee
      Authentication__Keycloak__RequireHttpsMetadata: "false"
      Authentication__Keycloak__ValidateAudience: "false"
      Authentication__Keycloak__SwaggerClientId: shopbe-swagger
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=shopbend;Username=shop;Password=shop

volumes:
  nuget_packages:
  shopbe_web_bin:
  shopbe_web_obj:




